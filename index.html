<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SpotMaster | Admin Panel</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --danger: #ef4444; --success: #10b981; --text: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 40px; margin: 0; }
        
        .glass-card { background: var(--card); padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 800px; border: 1px solid rgba(255,255,255,0.1); text-align: center; margin-bottom: 30px; }
        
        #map-wrapper { position: relative; display: none; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 4px solid var(--card); cursor: crosshair; margin-top: 20px; }
        #preview-img { display: block; max-width: 100%; height: auto; }

        /* Styl teček */
        .dot { position: absolute; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; border: 2px solid white; transform: translate(-50%, -50%); pointer-events: none; box-shadow: 0 0 10px var(--accent); }
        .temp-dot { background: #fbbf24; animation: pulse 1.5s infinite; box-shadow: 0 0 15px #fbbf24; }
        @keyframes pulse { 0% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.3); } 100% { transform: translate(-50%, -50%) scale(1); } }

        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 12px 20px; border-radius: 12px; width: 80%; margin: 10px 0; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); }
        
        .btn { background: var(--accent); color: #0f172a; border: none; padding: 12px 28px; border-radius: 12px; cursor: pointer; font-weight: 700; transition: 0.3s; margin: 5px; }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }
        .btn-save { background: var(--success); color: white; }
        .btn-del { background: var(--danger); color: white; padding: 5px 12px; font-size: 12px; }

        .list-container { text-align: left; margin-top: 30px; width: 100%; max-width: 600px; }
        .point-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: rgba(255,255,255,0.05); margin-bottom: 8px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body>

<div class="glass-card">
    <h1 style="margin-top:0">🛠️ SpotMaster Admin</h1>
    <p style="color: #94a3b8;">Spravujete hru: <code style="color:var(--accent)">game_map_1</code></p>
    
    <!-- Nastavení mapy -->
    <div style="margin-bottom: 20px;">
        <input type="text" id="imgUrl" placeholder="Vložte URL obrázku mapy">
        <button class="btn" onclick="updateMapUrl()">Nastavit mapu</button>
    </div>

    <!-- Ovládání bodu -->
    <div id="point-controls" style="display:none; border-top: 1px solid #334155; padding-top: 20px;">
        <p>1. Klikněte do mapy pro umístění bodu <br> 2. Zadejte název a uložte</p>
        <input type="text" id="pointName" placeholder="Název místa (např. Praha)">
        <button id="save-btn" class="btn btn-save" style="display:none" onclick="saveNewPoint()">💾 Uložit bod do DB</button>
    </div>
</div>

<div id="map-wrapper">
    <img id="preview-img" src="">
</div>

<div class="list-container">
    <h3>Seznam bodů na mapě:</h3>
    <div id="points-list"></div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, arrayRemove, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBk5RhLvFA070pSDVQSM3niH7Do9GzaBF4",
        authDomain: "spotmaster-e5325.firebaseapp.com",
        projectId: "spotmaster-e5325",
        appId: "1:718745490669:web:631396aa880fe4069768e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const docRef = doc(db, "games", "game_map_1");

    let tempCoords = { x: 0, y: 0 };

    // Inicializace - načtení existujících dat
    async function init() {
        const snap = await getDoc(docRef);
        if (snap.exists()) {
            const data = snap.data();
            if (data.imageUrl) {
                document.getElementById('preview-img').src = data.imageUrl;
                document.getElementById('map-wrapper').style.display = "inline-block";
                document.getElementById('point-controls').style.display = "block";
                renderPoints(data.points || []);
            }
        }
    }

    // Aktualizace URL obrázku
    window.updateMapUrl = async () => {
        const url = document.getElementById('imgUrl').value;
        if (!url) return alert("Zadejte URL!");
        
        await setDoc(docRef, { imageUrl: url }, { merge: true });
        location.reload();
    };

    // Kliknutí do mapy
    document.getElementById('map-wrapper').onclick = (e) => {
        const rect = e.target.getBoundingClientRect();
        tempCoords.x = ((e.clientX - rect.left) / rect.width) * 100;
        tempCoords.y = ((e.clientY - rect.top) / rect.height) * 100;

        // Odstranění staré náhledové tečky
        const old = document.querySelector('.temp-dot');
        if (old) old.remove();

        // Vytvoření nové náhledové tečky
        const dot = document.createElement('div');
        dot.className = 'dot temp-dot';
        dot.style.left = tempCoords.x + "%";
        dot.style.top = tempCoords.y + "%";
        document.getElementById('map-wrapper').appendChild(dot);

        document.getElementById('save-btn').style.display = "inline-block";
    };

    // Uložení bodu
    window.saveNewPoint = async () => {
        const name = document.getElementById('pointName').value;
        if (!name) return alert("Zadejte název místa!");

        await updateDoc(docRef, {
            points: arrayUnion({ name: name, x: tempCoords.x, y: tempCoords.y })
        });

        document.getElementById('pointName').value = "";
        document.getElementById('save-btn').style.display = "none";
        const old = document.querySelector('.temp-dot');
        if (old) old.remove();

        alert("Bod uložen!");
        init(); // Refresh seznamu
    };

    // Vykreslení seznamu a teček
    function renderPoints(points) {
        const listDiv = document.getElementById('points-list');
        listDiv.innerHTML = "";
        
        // Odstranění starých fixních teček
        document.querySelectorAll('.dot:not(.temp-dot)').forEach(d => d.remove());

        points.forEach(p => {
            // Přidání do textového seznamu
            const item = document.createElement('div');
            item.className = 'point-item';
            item.innerHTML = `<span><strong>${p.name}</strong> [${p.x.toFixed(1)}%, ${p.y.toFixed(1)}%]</span>`;
            
            const delBtn = document.createElement('button');
            delBtn.className = 'btn btn-del';
            delBtn.innerText = "Smazat";
            delBtn.onclick = () => deletePoint(p);
            
            item.appendChild(delBtn);
            listDiv.appendChild(item);

            // Přidání tečky na mapu pro vizuální kontrolu
            const dot = document.createElement('div');
            dot.className = 'dot';
            dot.style.left = p.x + "%";
            dot.style.top = p.y + "%";
            document.getElementById('map-wrapper').appendChild(dot);
        });
    }

    // Smazání bodu
    async function deletePoint(pointObj) {
        if (confirm(`Opravdu smazat bod ${pointObj.name}?`)) {
            await updateDoc(docRef, {
                points: arrayRemove(pointObj)
            });
            init();
        }
    }

    init();
</script>
</body>
</html>
