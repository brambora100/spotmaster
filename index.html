<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>SpotMaster | The Game</title>
    <style>
        :root { --bg: #0b0e14; --panel: #161b22; --accent: #79c0ff; --success: #3fb950; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        /* Úvodní Start obrazovka */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 14, 20, 0.95);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 2000; transition: 0.5s;
        }

        .hud { background: var(--panel); width: 90%; max-width: 900px; padding: 20px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #30363d; margin-bottom: 20px; opacity: 0.3; pointer-events: none; }
        .hud.active { opacity: 1; pointer-events: auto; }

        #target-name { font-size: 24px; font-weight: bold; color: var(--accent); }
        
        .map-container { position: relative; border-radius: 20px; overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8); border: 2px solid #30363d; filter: blur(10px); transition: 0.5s; }
        .map-container.active { filter: blur(0); }

        #game-img { max-width: 90vw; max-height: 65vh; display: block; }
        .game-dot { position: absolute; width: 25px; height: 25px; border: 3px solid white; border-radius: 50%; transform: translate(-50%, -50%); cursor: pointer; transition: 0.3s; background: rgba(255,255,255,0.1); display: none; }
        .game-dot.visible { display: block; }
        .game-dot.correct { border-color: var(--success); background: var(--success); pointer-events: none; }
        
        .leaderboard { width: 90%; max-width: 600px; margin-top: 40px; background: var(--panel); padding: 25px; border-radius: 24px; border: 1px solid #30363d; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #8b949e; border-bottom: 1px solid #30363d; padding: 10px; }
        td { padding: 12px 10px; border-bottom: 1px solid #21262d; }
        
        #save-screen { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--panel); padding: 30px; border-radius: 24px; border: 2px solid var(--accent); text-align: center; display: none; z-index: 1000; }
        .btn { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 20px; transition: 0.3s; }
        .btn:hover { transform: scale(1.1); box-shadow: 0 0 20px var(--accent); }
    </style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-overlay">
    <h1 style="font-size: 48px; margin-bottom: 10px;">📍 SpotMaster</h1>
    <p style="color: #8b949e; margin-bottom: 30px;">Najdi všechny body na mapě co nejrychleji!</p>
    <button class="btn" onclick="startGame()">START HRY</button>
</div>

<div class="hud" id="game-hud">
    <div>Chyby: <span id="errs" style="color:#ff7b72">0</span></div>
    <div id="target-name">PŘIPRAV SE...</div>
    <div>Čas: <span id="time" style="color:var(--accent)">0</span>s</div>
</div>

<div class="map-container" id="map-root">
    <img id="game-img" src="">
</div>

<div class="leaderboard">
    <h3 style="margin:0; text-align:center;">🏆 Žebříček nejrychlejších</h3>
    <table id="leaderboard-table">
        <thead><tr><th>Hráč</th><th>Čas</th><th>Chyby</th></tr></thead>
        <tbody></tbody>
    </table>
</div>

<div id="save-screen">
    <h2 style="color:var(--success)">KONEC HRY!</h2>
    <p id="stats-summary"></p>
    <input type="text" id="nick" placeholder="Tvé jméno" style="padding:10px; margin-bottom:10px; border-radius:8px; border:none; width:80%"><br>
    <button class="btn" style="font-size: 16px;" onclick="saveScore()">ULOŽIT SKÓRE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, collection, addDoc, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBk5RhLvFA070pSDVQSM3niH7Do9GzaBF4",
        authDomain: "spotmaster-e5325.firebaseapp.com",
        projectId: "spotmaster-e5325",
        appId: "1:718745490669:web:631396aa880fe4069768e4"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let points = [], current = null, errors = 0, seconds = 0, timer, gameRunning = false;

    // Načtení dat (ale hra ještě neběží)
    async function loadData() {
        const snap = await getDoc(doc(db, "games", "game_map_1"));
        if (!snap.exists()) return;
        
        document.getElementById('game-img').src = snap.data().imageUrl;
        points = snap.data().points;
        
        points.forEach(p => {
            const dot = document.createElement('div');
            dot.className = 'game-dot';
            dot.style.left = p.x + "%"; dot.style.top = p.y + "%";
            dot.onclick = () => {
                if (!gameRunning) return;
                if (p.name === current.name) {
                    p.done = true; dot.classList.add('correct'); next();
                } else {
                    errors++; document.getElementById('errs').innerText = errors;
                }
            };
            document.getElementById('map-root').appendChild(dot);
        });

        // Načítání žebříčku
        const q = query(collection(db, "leaderboard"), orderBy("seconds", "asc"), limit(10));
        onSnapshot(q, (snap) => {
            const tbody = document.querySelector("#leaderboard-table tbody");
            tbody.innerHTML = "";
            snap.forEach(doc => {
                const d = doc.data();
                tbody.innerHTML += `<tr><td>${d.nick}</td><td>${d.seconds}s</td><td>${d.errors}</td></tr>`;
            });
        });
    }

    // Funkce, která se spustí po kliknutí na tlačítko Start
    window.startGame = () => {
        gameRunning = true;
        document.getElementById('start-overlay').style.opacity = "0";
        setTimeout(() => document.getElementById('start-overlay').style.display = "none", 500);
        
        document.getElementById('game-hud').classList.add('active');
        document.getElementById('map-root').classList.add('active');
        
        // Zviditelníme tečky
        document.querySelectorAll('.game-dot').forEach(d => d.classList.add('visible'));
        
        next();
        timer = setInterval(() => { 
            seconds++; 
            document.getElementById('time').innerText = seconds; 
        }, 1000);
    };

    function next() {
        const left = points.filter(p => !p.done);
        if (left.length === 0) {
            gameRunning = false;
            clearInterval(timer);
            document.getElementById('save-screen').style.display = "block";
            document.getElementById('stats-summary').innerText = `Čas: ${seconds}s | Chyby: ${errors}`;
            return;
        }
        current = left[Math.floor(Math.random() * left.length)];
        document.getElementById('target-name').innerText = `NAJDI: ${current.name.toUpperCase()}`;
    }

    window.saveScore = async () => {
        const nick = document.getElementById('nick').value || "Hráč";
        await addDoc(collection(db, "leaderboard"), { nick, seconds, errors, date: Date.now() });
        location.reload();
    };

    loadData();
</script>
</body>
</html>
